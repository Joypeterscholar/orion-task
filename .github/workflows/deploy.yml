name: Deploy Orion Task Page
 
# ─────────────────────────────────────────────
# TRIGGER: runs on every push to main branch
# This is the core of GitHub Actions — we define
# WHAT event causes the workflow to execute.
# ─────────────────────────────────────────────
on:
  push:
    branches: ["main"]
  workflow_dispatch:   # Allow manual trigger from GitHub UI
 
# ─────────────────────────────────────────────
# PERMISSIONS: needed to deploy to GitHub Pages
# ─────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write
 
# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false
 
# ─────────────────────────────────────────────
# JOBS: the units of work in a GitHub Action
# ─────────────────────────────────────────────
jobs:
 
  # ── JOB 1: Build ──────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest           # GitHub-hosted runner (fresh Ubuntu VM)
 
    steps:
      # Step 1: Check out the repo code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # Step 2: Validate the HTML file exists
      - name: Verify index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html not found!"
            exit 1
          fi
          echo "✅ index.html found — ready to deploy"
 
      # Step 3: Upload the site as a Pages artifact
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Upload entire repo root
 
  # ── JOB 2: Deploy ─────────────────────────
  # This job NEEDS 'build' to pass first.
  # It only runs after build succeeds — that's
  # job dependency in GitHub Actions.
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build          # <-- dependency on build job
 
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
      - name: Print deployment URL
        run: |
          echo "🚀 Orion Task deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
 
